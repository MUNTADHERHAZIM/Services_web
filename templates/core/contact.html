{% extends 'base.html' %}
{% block title %}اتصل بنا - {{ SITE_NAME }}{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-10">
            <div class="text-center mb-5">
                <i class="bi bi-envelope display-3 text-primary mb-3"></i>
                <h1 class="fw-bold">اتصل بنا</h1>
                <p class="lead text-muted">نحن هنا لمساعدتك</p>
            </div>

            <div class="row g-4">
                <div class="col-md-4">
                    <div class="card h-100 text-center">
                        <div class="card-body p-5">
                            <i class="bi bi-geo-alt display-4 text-primary mb-3"></i>
                            <h5 class="fw-bold">العنوان</h5>
                            <p class="text-muted mb-0">
                                جمهورية العراق<br>
                                البصرة
                            </p>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card h-100 text-center">
                        <div class="card-body p-5">
                            <i class="bi bi-telephone display-4 text-primary mb-3"></i>
                            <h5 class="fw-bold">الهاتف</h5>
                            <p class="text-muted mb-0" dir="ltr">
                                +964 770 000 0000
                            </p>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card h-100 text-center">
                        <div class="card-body p-5">
                            <i class="bi bi-envelope display-4 text-primary mb-3"></i>
                            <h5 class="fw-bold">البريد الإلكتروني</h5>
                            <p class="text-muted mb-0">
                                info@services.com
                            </p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card mt-5">
                <div class="card-body p-5">
                    <h3 class="fw-bold mb-4 text-center">أرسل لنا رسالة</h3>
                    <form>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">الاسم</label>
                                <input type="text" class="form-control" placeholder="اسمك الكامل">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">البريد الإلكتروني</label>
                                <input type="email" class="form-control" placeholder="example@email.com" dir="ltr">
                            </div>
                            <div class="col-12">
                                <label class="form-label">الموضوع</label>
                                <input type="text" class="form-control" placeholder="موضوع الرسالة">
                            </div>
                            <div class="col-12">
                                <label class="form-label">الرسالة</label>
                                <textarea class="form-control" rows="5" placeholder="اكتب رسالتك هنا..."></textarea>
                            </div>
                            <div class="col-12 text-center">
                                <button type="submit" class="btn btn-primary btn-lg px-5">
                                    <i class="bi bi-send me-2"></i>إرسال
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
