{% extends 'base.html' %}
{% load static %}

{% block title %}تحديث حالة الطلب - {{ block.super }}{% endblock %}

{% block content %}
<div class="container my-5">
    <div class="row">
        <div class="col-lg-6 mx-auto">
            <div class="card shadow">
                <div class="card-header bg-warning text-dark">
                    <h4 class="mb-0"><i class="bi bi-clock-history me-2"></i>تحديث حالة الطلب #{{ request.id }}</h4>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label fw-bold">الحالة الجديدة</label>
                            <select name="status" class="form-select" required>
                                {% for value, label in status_choices %}
                                <option value="{{ value }}" {% if value==request.status %}selected{% endif %}>
                                    {{ label }}
                                </option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">ملاحظات (اختياري)</label>
                            <textarea name="notes" class="form-control" rows="3"
                                placeholder="أضف أي ملاحظات..."></textarea>
                        </div>

                        <div class="text-end">
                            <a href="{% url 'requests:track_request' request.id %}" class="btn btn-secondary">
                                <i class="bi bi-x-circle me-2"></i>إلغاء
                            </a>
                            <button type="submit" class="btn btn-warning">
                                <i class="bi bi-check-circle me-2"></i>تحديث الحالة
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
